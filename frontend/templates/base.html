<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<link rel="stylesheet" href="{{ url_for('static', filename='dist/app.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/legacy.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar-v2.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>

<body>

    <div class="layout">

        <aside id="sidebar" class="sidebar">

        <img
            src="{{ url_for('static', filename='images/logo-light.png') }}"
            class="sidebar-logo"
            alt="APTP">

        <button id="toggleSidebar" class="sidebar-toggle">
            <i class="fa fa-bars"></i>
        </button>

    </aside>

    <main class="content">

        <div class="page-header">

            <div class="page-header-left">

                <h1>{{ page_title }}</h1>

                <p>{{ page_subtitle }}</p>

            </div>

            <div class="page-header-right">

                <div class="badge">
                    Online
                </div>

                <div class="version">
                    v2.0-dev
                </div>

            </div>

        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}

        {% if messages %}

            {% for category, message in messages %}

                <div class="flash flash-{{ category }}">
                    {{ message }}
                </div>

            {% endfor %}

        {% endif %}

        {% endwith %}

        {% block content %}
        {% endblock %}

</main>

</div>

<script>

const sidebar = document.getElementById("sidebar");
const toggle = document.getElementById("toggleSidebar");

if (localStorage.getItem("sidebarState") === "collapsed") {
    sidebar.classList.add("collapsed");
}

toggle.addEventListener("click", () => {

    sidebar.classList.toggle("collapsed");

    if (sidebar.classList.contains("collapsed")) {
        localStorage.setItem("sidebarState", "collapsed");
    } else {
        localStorage.setItem("sidebarState", "expanded");
    }

});

</script>

</body>
</html>
