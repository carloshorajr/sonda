{% extends "base.html" %}

{% block content %}

<div class="settings-grid">

    <div class="card">

        <h2>Informações Gerais</h2>

        <form method="post">

            <div class="form-group">

                <label>Nome da Sonda</label>

                <input
                    type="text"
                    name="nome"
                    value="{{ settings.nome }}"
                >

            </div>

            <div class="form-group">

                <label>Cliente</label>

                <input
                    type="text"
                    name="cliente"
                    value="{{ settings.cliente }}"
                >

            </div>

            <div class="form-group">

                <label>Local</label>

                <input
                    type="text"
                    name="local"
                    value="{{ settings.local }}"
                >

            </div>

            <div class="form-group">

                <label>Descrição</label>

                <textarea
                    rows="4"
                    name="descricao"
                >{{ settings.descricao }}</textarea>

            </div>

    </div>

    <div class="card">

        <h2>Comunicação</h2>

        <div class="form-group">

            <label>UUID</label>

                <input
                    type="text"
                    name="uuid"
                    value="{{ settings.uuid }}"
                    readonly
                >

        </div>

        <div class="form-row">

            <div class="form-group">

                <label>Heartbeat (s)</label>

                <input
                    type="number"
                    name="heartbeat"
                    value="{{ settings.heartbeat }}"
                    min="10"
                    max="3600"
                    step="1"
                >

            </div>

            <div class="form-group">

                <label>Coleta (s)</label>

                <input
                    type="number"
                    name="coleta"
                    value="{{ settings.coleta }}"
                    min="5"
                    max="3600"
                    step="1"
                >

            </div>

        </div>

        <button class="btn-primary">

            Salvar Configurações

        </button>

        </form>

    </div>

</div>

{% endblock %}
